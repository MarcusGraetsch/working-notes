<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Capitalism Research - Knowledge Graph</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fafafa;
        }

        #graph-container {
            width: 100%;
            height: 100vh;
            background: #fafafa;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .controls h3 {
            margin-bottom: 10px;
            font-size: 14px;
            color: #333;
        }

        .controls button {
            display: block;
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 5px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: opacity 0.2s;
        }

        .controls button:hover {
            opacity: 0.8;
        }

        .btn-all { background: #3498db; color: white; }
        .btn-concepts { background: #e74c3c; color: white; }
        .btn-tasks { background: #2ecc71; color: white; }
        .btn-articles { background: #9b59b6; color: white; }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-size: 12px;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .stats {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            z-index: 100;
            font-size: 12px;
            color: #666;
        }

        .stats strong {
            color: #333;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #999;
        }

        .tooltip {
            position: absolute;
            padding: 10px;
            background: rgba(0,0,0,0.8);
            color: white;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 250px;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h3>Filter</h3>
        <button class="btn-all" onclick="filterGraph('all')">Alle anzeigen</button>
        <button class="btn-concepts" onclick="filterGraph('concepts')">Nur Konzepte</button>
        <button class="btn-tasks" onclick="filterGraph('tasks')">Nur Tasks</button>
        <button class="btn-articles" onclick="filterGraph('articles')">Nur Artikel</button>
    </div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-color" style="background: #e74c3c;"></div>
            <span id="legend-concepts">Konzepte</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #2ecc71;"></div>
            <span id="legend-tasks">Research Tasks</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #3498db;"></div>
            <span id="legend-articles">Artikel</span>
        </div>
    </div>

    <div class="stats" id="stats"></div>

    <div id="graph-container">
        <div class="loading" id="loading">Lade Forschungsdaten...</div>
    </div>
    <div class="tooltip" id="tooltip"></div>

    <script>
let simulation, svg, link, node, g;
const tooltip = d3.select("#tooltip");

async function loadGraphData() {
    try {
        const response = await fetch('/graph/graph-data.json');
        if (!response.ok) throw new Error('Failed to load graph data');
        return await response.json();
    } catch (err) {
        document.getElementById('loading').textContent = 'Fehler beim Laden der Daten: ' + err.message;
        throw err;
    }
}

function initGraph(graphData) {
    document.getElementById('loading').style.display = 'none';

    // Update legend with live counts
    const stats = graphData.stats;
    document.getElementById('legend-concepts').textContent = 'Konzepte (' + stats.concepts + ')';
    document.getElementById('legend-tasks').textContent = 'Research Tasks (' + stats.tasks + ')';
    document.getElementById('legend-articles').textContent = 'Artikel (' + stats.totalArticles.toLocaleString('de-DE') + ' gesamt, ' + stats.displayedArticles + ' angezeigt)';

    // Show stats
    const generated = new Date(graphData.generated);
    document.getElementById('stats').innerHTML =
        '<strong>Live-Daten</strong><br>' +
        stats.totalArticles.toLocaleString('de-DE') + ' Artikel gesammelt<br>' +
        stats.matchedArticles + ' thematisch zugeordnet<br>' +
        stats.links + ' Verknüpfungen<br>' +
        '<br>Stand: ' + generated.toLocaleDateString('de-DE');

    const container = document.getElementById('graph-container');
    const width = container.clientWidth;
    const height = container.clientHeight;

    svg = d3.select('#graph-container')
        .append('svg')
        .attr('width', width)
        .attr('height', height)
        .attr('viewBox', [0, 0, width, height]);

    g = svg.append('g');

    svg.call(d3.zoom()
        .extent([[0, 0], [width, height]])
        .scaleExtent([0.3, 4])
        .on('zoom', (event) => {
            g.attr('transform', event.transform);
        }));

    const color = d3.scaleOrdinal()
        .domain([1, 2, 3])
        .range(['#e74c3c', '#2ecc71', '#3498db']);

    simulation = d3.forceSimulation(graphData.nodes)
        .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(d => {
            // Shorter distance for task-concept links, longer for article links
            if (d.type === 'covers') return 80;
            if (d.type === 'related') return 60;
            return 100;
        }))
        .force('charge', d3.forceManyBody().strength(d => d.type === 'concept' ? -600 : -200))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(d => d.size + 5));

    link = g.append('g')
        .attr('stroke', '#999')
        .attr('stroke-opacity', 0.4)
        .selectAll('line')
        .data(graphData.links)
        .join('line')
        .attr('stroke-width', d => d.type === 'covers' ? 3 : d.type === 'related' ? 1 : 1.5)
        .attr('stroke-dasharray', d => d.type === 'related' ? '4,4' : null)
        .attr('stroke', d => d.type === 'covers' ? '#2ecc71' : '#999');

    node = g.append('g')
        .selectAll('g')
        .data(graphData.nodes)
        .join('g')
        .call(d3.drag()
            .on('start', dragstarted)
            .on('drag', dragged)
            .on('end', dragended));

    node.append('circle')
        .attr('r', d => d.size)
        .attr('fill', d => color(d.group))
        .attr('stroke', '#fff')
        .attr('stroke-width', d => d.type === 'concept' ? 3 : 2)
        .style('cursor', d => d.url ? 'pointer' : 'grab')
        .on('mouseover', function(event, d) {
            let html = '<strong>' + d.name + '</strong>';
            if (d.description) html += '<br/>' + d.description;
            if (d.articleCount) html += '<br/><em>' + d.articleCount + ' Artikel</em>';
            tooltip
                .style('opacity', 1)
                .html(html)
                .style('left', (event.pageX + 10) + 'px')
                .style('top', (event.pageY - 10) + 'px');
        })
        .on('mouseout', function() {
            tooltip.style('opacity', 0);
        })
        .on('click', function(event, d) {
            if (d.url) window.open(d.url, '_blank');
        });

    // Labels only for concepts and tasks (articles too cluttered)
    node.filter(d => d.type !== 'article')
        .append('text')
        .text(d => d.name)
        .attr('x', 0)
        .attr('y', d => d.size + 15)
        .attr('text-anchor', 'middle')
        .attr('font-size', '11px')
        .attr('font-weight', '600')
        .attr('fill', '#333')
        .style('pointer-events', 'none')
        .style('text-shadow', '0 1px 2px rgba(255,255,255,0.8)');

    simulation.on('tick', () => {
        link
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);

        node.attr('transform', d => 'translate(' + d.x + ',' + d.y + ')');
    });
}

function dragstarted(event, d) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    d.fx = d.x;
    d.fy = d.y;
    d3.select(this).select('circle').style('cursor', 'grabbing');
}

function dragged(event, d) {
    d.fx = event.x;
    d.fy = event.y;
}

function dragended(event, d) {
    if (!event.active) simulation.alphaTarget(0);
    d.fx = null;
    d.fy = null;
    d3.select(this).select('circle').style('cursor', d.url ? 'pointer' : 'grab');
}

function filterGraph(type) {
    if (!node || !link) return;

    if (type === 'all') {
        node.transition().duration(300).style('opacity', 1);
        link.transition().duration(300).style('opacity', 1);
    } else if (type === 'concepts') {
        node.transition().duration(300).style('opacity', d => d.type === 'concept' ? 1 : 0.1);
        link.transition().duration(300).style('opacity', d =>
            (d.type === 'covers') ? 0.6 : 0.05
        );
    } else if (type === 'tasks') {
        node.transition().duration(300).style('opacity', d => (d.type === 'task' || d.type === 'concept') ? 1 : 0.1);
        link.transition().duration(300).style('opacity', d =>
            (d.type === 'covers') ? 1 : 0.05
        );
    } else if (type === 'articles') {
        node.transition().duration(300).style('opacity', d => d.type === 'article' ? 1 : 0.15);
        link.transition().duration(300).style('opacity', d =>
            (d.source.type === 'article' || d.target.type === 'article') ? 0.6 : 0.05
        );
    }
}

// Load data and initialize
window.addEventListener('load', () => {
    loadGraphData().then(initGraph);
});
window.addEventListener('resize', () => {
    d3.select('#graph-container svg').remove();
    loadGraphData().then(initGraph);
});
    </script>
</body>
</html>
